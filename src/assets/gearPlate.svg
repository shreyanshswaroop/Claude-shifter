    </filter>
  </defs>

  <circle cx="210" cy="210" r="165" fill="url(#metal)" stroke="#f7efe2" stroke-width="3" filter="url(#softShadow)"></circle>

  <circle cx="210" cy="210" r="158" stroke="rgba(255,255,255,0.35)" stroke-width="2"></circle>
  <circle cx="210" cy="210" r="145" stroke="rgba(0,0,0,0.12)" stroke-width="1"></circle>

  <g filter="url(#slotShadow)">
    <rect x="90" y="70" width="36" height="280" rx="18" fill="#050505"></rect>
    <rect x="192" y="70" width="36" height="280" rx="18" fill="#050505"></rect>
    <rect x="294" y="70" width="36" height="280" rx="18" fill="#050505"></rect>
    <rect x="108" y="192" width="204" height="36" rx="18" fill="#050505"></rect>
