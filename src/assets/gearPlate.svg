<svg width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="metal" cx="38%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#fff7e8"></stop>
      <stop offset="38%" stop-color="#ddd5c5"></stop>
      <stop offset="65%" stop-color="#aaa195"></stop>
      <stop offset="100%" stop-color="#f2eadc"></stop>
    </radialGradient>

    <filter id="softShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="black" flood-opacity="0.55"></feDropShadow>
    </filter>

    <filter id="slotShadow">
